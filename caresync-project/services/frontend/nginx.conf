
# ── CareSync Frontend — nginx Reverse Proxy Config ───────────────────────────
#
# This file is a TEMPLATE. At container startup, the Dockerfile CMD runs:
#   envsubst '${INTERNAL_ALB_DNS}' < default.conf.template > default.conf
#
# INTERNAL_ALB_DNS must be set as a runtime environment variable:
#   • docker-compose: environment: INTERNAL_ALB_DNS=<your-internal-alb-dns>
#   • EC2 User Data / ASG Launch Template: export INTERNAL_ALB_DNS=...
#   • Example: internal-caresync-alb-123456789.us-east-1.elb.amazonaws.com
#
# envsubst only replaces ${INTERNAL_ALB_DNS}.
# Nginx variables like $uri, $host, $remote_addr are left unchanged.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── API Reverse Proxy → Internal ALB ─────────────────────────────────────
    # nginx intercepts all /api/* requests from the React SPA and proxies them
    # to the Internal ALB. The Internal ALB then routes by path prefix to the
    # correct backend microservice target group.
    #
    # Path → Backend Service:
    #   /api/auth/*         → auth-service (port 4001)
    #   /api/patients/*     → patient-service (port 4002)
    #   /api/doctors/*      → doctor-service (port 4003)
    #   /api/appointments/* → appointment-service (port 4004)
    # ─────────────────────────────────────────────────────────────────────────

    location /api/auth/ {
        proxy_pass          http://${INTERNAL_ALB_DNS};
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_set_header Content-Length $content_length;
        proxy_set_header Content-Type $content_type;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    location /api/patients/ {
        proxy_pass          http://${INTERNAL_ALB_DNS};
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        
        proxy_set_header Content-Length $content_length;
        proxy_set_header Content-Type $content_type;

	proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    location /api/doctors/ {
        proxy_pass          http://${INTERNAL_ALB_DNS};
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_set_header Content-Length $content_length;
        proxy_set_header Content-Type $content_type;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    location /api/appointments/ {
        proxy_pass          http://${INTERNAL_ALB_DNS};
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_set_header Content-Length $content_length;
        proxy_set_header Content-Type $content_type;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ── React SPA Fallback ───────────────────────────────────────────────────
    # Must come AFTER /api/* blocks to avoid catching API 404s
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/x-font-ttf font/opentype image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;
}
